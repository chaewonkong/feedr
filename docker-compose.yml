services:
  db:
    image: postgres:17
    environment:
      POSTGRES_USER: feedr
      POSTGRES_PASSWORD: feedr
      POSTGRES_DB: feedr
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U feedr"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://feedr:feedr@db:5432/feedr

volumes:
  pgdata:
